# [프로젝트 이름 설정]
spring.application.name=busanit501-EC2

# [데이터베이스(DB) 연결 설정]
# 사용하려는 DB 드라이버 (MariaDB 전용 드라이버 사용)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# DB 접속 주소 (현재 내 컴퓨터의 3306 포트, wedb라는 데이터베이스에 접속)
spring.datasource.url=jdbc:mariadb://localhost:3306/wedb?serverTimezone=Asia/Seoul&useSSL=false

# DB 접속 아이디와 비밀번호
spring.datasource.username=busanit501
spring.datasource.password=busanit501!!

# [커넥션 풀(HikariCP) 설정]
# DB 연결 통로를 미리 몇 개 만들어둘지 설정 (성능 최적화용)
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=2

# [JPA 및 하이버네이트 설정]
# 서버가 켜질 때 DB 테이블을 어떻게 할지 (update: 바뀐 부분만 자동 수정)
spring.jpa.hibernate.ddl-auto=update
# 콘솔창에 출력되는 SQL문을 보기 좋게 정렬해서 보여줌
spring.jpa.properties.hibernate.format_sql=true
# 실제로 실행되는 SQL문을 콘솔창에 출력함
spring.jpa.show-sql=true

# [로그(Log) 출력 수준 설정]
# 서버가 돌아가는 기록(로그)을 어느 정도까지 보여줄지 결정
logging.level.org.springframework=info
# 내가 만든 코드(com.busanit501 패키지)의 로그를 상세히(debug) 보여줌
logging.level.com.busanit501=debug
# 보안(Security) 관련 로그를 아주 세밀하게(trace) 보여줌
logging.level.org.springframework.security=trace

# [AWS S3 클라우드 저장소 설정]
# 내 S3 창고(버킷)의 이름
cloud.aws.s3.bucket=busanit501-s3-project
# AWS IAM에서 발급받은 신분증 아이디 (Access Key)
cloud.aws.credentials.access-key=본인꺼
# AWS IAM에서 발급받은 신분증 비밀번호 (Secret Key)
cloud.aws.credentials.secret-key=본인꺼
# S3 창고가 위치한 지역 (ap-northeast-2: 서울 리전)
cloud.aws.region.static=ap-northeast-2

# [파일 업로드 관련 설정]
# 스프링 부트에서 파일 업로드 기능을 사용할지 여부
spring.servlet.multipart.enabled=true

# 파일이 S3로 가기 전, 내 컴퓨터에 잠시 머무는 임시 폴더 경로
#com.busanit501.upload.path=C:\\upload

# 🚨 수정됨: 리눅스(EC2)에는 C드라이브가 없습니다!
# 보통 /home/ec2-user/upload 같은 리눅스 경로를 사용합니다.
com.busanit501.upload.path=/home/ec2-user/upload

# 한 번의 요청(게시글 작성 등)에 담을 수 있는 전체 파일 총 용량 (30MB 제한)
spring.servlet.multipart.max-request-size=30MB
# 파일 1개당 가질 수 있는 최대 크기 (10MB 제한)
spring.servlet.multipart.max-file-size=10MB